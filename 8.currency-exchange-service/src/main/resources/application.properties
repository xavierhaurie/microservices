spring.application.name=currency-exchange
spring.config.import=optional:configserver:http://localhost:8888
#default
server.port=8000
spring.jpa.show-sql=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.h2.console.enabled=true
spring.jpa.defer-datasource-initialization=true

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# as per debugging instructions for Eureka
#eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

resilience4j.retry.instances.sample-api.maxAttempts=5
resilience4j.retry.instances.sample-api.waitDuration=1s
resilience4j.retry.instances.sample-api.enableExponentialBackoff=true
# see https://resilience4j.readme.io/docs/getting-started-3 for more options

resilience4j.ratelimiter.instances.default.limitForPeriod=2
resilience4j.ratelimiter.instances.default.limitRefreshPeriod=10s

# difficult to test
resilience4j.bulkhead.instances.default.maxConcurrentCalls=10
resilience4j.bulkhead.instances.sample-api.maxConcurrentCalls=1
# SB 3
#management.tracing.sampling.probability=1.0
# SB 4
#management.tracing.sampling.fraction=1.0
#management.otlp.tracing.endpoint=http://localhost:9411/v1/traces
#management.endpoints.web.exposure.include=health,metrics,traces
management.tracing.sampling.fraction=1.0
management.tracing.sampling.probability=1.0
#management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:9411/v1/traces
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:9411/v1/traces
management.tracing.propagation.type=w3c

logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

#logging.level.io.opentelemetry=DEBUG
logging.level.zipkin2=DEBUG
logging.level.io.opentelemetry=DEBUG
logging.level.io.micrometer=DEBUG






# Enable discovery-based routing
#spring.cloud.gateway.discovery.locator.enabled=true
#spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Actuator
management.endpoints.web.exposure.include=*
